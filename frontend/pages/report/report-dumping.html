<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Rescue System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
padding:20px;
color:white;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
font-size:32px;
}

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

/* CARD */

.card{

background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);

}

/* INPUT */

input,textarea,select{

width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-top:5px;
margin-bottom:10px;

}

/* BUTTON */

button{

width:100%;
padding:12px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;

}

button:hover{

transform:scale(1.05);

}

/* MAP */

iframe{

width:100%;
height:200px;
border-radius:10px;
margin-top:10px;

}

/* IMAGE */

img{

max-width:100%;
border-radius:10px;
margin-top:10px;

}

/* REPORT LIST */

.report{

background:rgba(0,0,0,0.3);
padding:10px;
margin-top:10px;
border-radius:10px;

}

.delete{

background:red;
margin-top:5px;

}

/* MOBILE */

@media(max-width:768px){

.container{

grid-template-columns:1fr;

}

}

</style>
</head>
<body>

<div class="header">
<h1>🐕 Animal Rescue Dashboard</h1>
<p>Help animals by reporting instantly</p>
</div>

<div class="container">

<!-- FORM -->
<div class="card">

<h2>Submit Report</h2>

<label>Animal Type</label>
<input id="animal" placeholder="Dog, Cat">

<label>Condition</label>
<select id="condition">
<option>Injured</option>
<option>Hungry</option>
<option>Lost</option>
<option>Healthy</option>
</select>

<label>Urgency</label>
<select id="urgency">
<option>Low</option>
<option>Medium</option>
<option>High</option>
<option>Emergency</option>
</select>

<label>Description</label>
<textarea id="desc"></textarea>

<label>Location</label>
<input id="location">

<button onclick="getLocation()">📍 Detect Location</button>

<div id="map"></div>

<label>Upload Photo</label>
<input type="file" id="photo" onchange="preview()">

<div id="preview"></div>

<button onclick="saveReport()">❤️ Submit Report</button>

</div>


<!-- REPORT LIST -->
<div class="card">

<h2>Previous Reports</h2>

<div id="reports"></div>

</div>

</div>


<script>

/* IMAGE PREVIEW */

let imageData=""

function preview(){

const file=photo.files[0]

const reader=new FileReader()

reader.onload=function(){

imageData=reader.result
preview.innerHTML=`<img src="${imageData}">`

}

reader.readAsDataURL(file)

}


/* LOCATION */

function getLocation(){

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude
const lon=pos.coords.longitude

location.value=lat+","+lon

map.innerHTML=

`<iframe src="https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed"></iframe>`

})

}


/* SAVE REPORT */

function saveReport(){

const report={

animal:animal.value,
condition:condition.value,
urgency:urgency.value,
desc:desc.value,
location:location.value,
image:imageData,
date:new Date().toLocaleString()

}

let reports=JSON.parse(localStorage.getItem("reports"))||[]

reports.push(report)

localStorage.setItem("reports",JSON.stringify(reports))

loadReports()

alert("Report Saved")

}


/* LOAD REPORTS */

function loadReports(){

let reports=JSON.parse(localStorage.getItem("reports"))||[]

reportsDiv.innerHTML=""

reports.forEach((r,i)=>{

reportsDiv.innerHTML+=`

<div class="report">

<b>${r.animal}</b> (${r.condition})<br>

Urgency: ${r.urgency}<br>

Location: ${r.location}<br>

${r.image?`<img src="${r.image}">`:""}

<button class="delete" onclick="deleteReport(${i})">Delete</button>

</div>

`

})

}

const reportsDiv=document.getElementById("reports")

/* DELETE */

function deleteReport(i){

let reports=JSON.parse(localStorage.getItem("reports"))

reports.splice(i,1)

localStorage.setItem("reports",JSON.stringify(reports))

loadReports()

}

loadReports()

</script>

</body>
</html>
