<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eco-Friendly Product Comparison Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Proper CSS Path -->
    <link rel="stylesheet" href="css/pages/product-comparison.css">
</head>
<body>

<header>
    <h1>Eco-Friendly Product Comparison Tool</h1>
    <p>Compare sustainable products by environmental impact, price, user ratings, and features.</p>
</header>

<section class="comparison-layout">

    <!-- SELECT PRODUCTS -->
    <div class="comparison-card">
        <h2>Select Products</h2>
        <div id="product-options"></div>
        <button id="compare-btn">Compare Selected</button>
    </div>

    <!-- ADD PRODUCT -->
    <div class="comparison-card">
        <h2>Add Product</h2>
        <form id="add-product-form">
            <input type="text" id="add-name" placeholder="Product Name" required>
            <input type="text" id="add-category" placeholder="Category" required>
            <input type="number" id="add-impact" placeholder="Impact Score (1-10)" min="1" max="10" required>
            <input type="number" id="add-price" placeholder="Price ($)" min="0" required>
            <input type="number" id="add-rating" placeholder="Rating (1-5)" min="1" max="5" required>
            <input type="text" id="add-features" placeholder="Features (comma separated)" required>
            <button type="submit">Add Product</button>
        </form>
    </div>

    <!-- RESULTS -->
    <div class="comparison-card hidden" id="comparison-table-section">
        <h2>Comparison Results</h2>
        <table id="comparison-table"></table>
        <button id="reset-btn">Reset</button>
    </div>

</section>

<!-- Proper JS Path -->
<script src="js/pages/product-comparison.js"></script>
</body>
</html>
